# config.yaml - configure paths and options for the snptest recalc-r2 pipeline

# File with ranges (one chr:start-end per line)
ranges_file: "ranges.txt"

# VCF location and suffix (vcf path constructed as: vcf_dir / chrX + vcf_suffix)
vcf_dir: "/path/to/vcf"
vcf_suffix: ".dose.vcf.gz"

# Oxford SNPTEST .sample file e.g. "/path/all_samples.txt" 
sample_file: "all_samples.txt"

# Directory containing group files (e.g. EUR.txt, Group1.txt). Each file is one sample ID per line.
sample_dir: "/path/to/groups"
sample_suffix: ".txt"

# Whether to include an "ALL" (no-filter) jobs by default.
# Set to true to create ALL jobs, false to only run explicit group files.
include_all: false

# Output directory (base). Results are written to results/{CHR}/ by default
output_base: "results"
